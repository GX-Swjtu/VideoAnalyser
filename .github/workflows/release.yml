# ============================================
# Release 工作流：push tag (v*) 时自动构建并发布
# 生成 11 个变体的发行资产：
#   1.  Windows MinGW Release 动态链接压缩包
#   2.  Windows MSVC  Release 动态链接压缩包
#   3.  Windows MinGW Release 静态单文件
#   4.  Windows MSVC  Release 静态单文件
#   5.  Linux   GCC   Release 动态链接压缩包
#   6.  Linux   GCC   Release 静态单文件
#   7.  macOS   Clang Release 动态链接 DMG（Apple Silicon）
#   8.  macOS   Clang Release 静态单文件（Apple Silicon）
#   9.  Windows MinGW Release 静态单文件 + UPX 压缩
#   10. Windows MSVC  Release 静态单文件 + UPX 压缩
#   11. Linux   GCC   Release 静态单文件 + UPX 压缩
# ============================================
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  QT_INSTALL_DIR: "${{ github.workspace }}/.qt"
  VCPKG_DOWNLOADS: "${{ github.workspace }}/.vcpkg/downloads"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT: 'b2f068faf45a3f04145bec0f52a66526ad590227'

jobs:
  # ── 1. Windows MinGW 动态链接 ─────────────────────────
  win-mingw:
    name: Windows MinGW (Dynamic)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-
            vcpkg-downloads-${{ runner.os }}-

      - name: Install Qt (MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          dir: '${{ env.QT_INSTALL_DIR }}'
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: 'qtcharts'
          tools: 'tools_mingw1310'
          cache: true

      - name: Set up MinGW
        shell: pwsh
        run: |
          $mingwBin = Get-ChildItem "$env:IQTA_TOOLS\mingw*\bin" -Directory | Select-Object -First 1
          echo "$mingwBin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Ensure vcpkg downloads directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "$env:VCPKG_DOWNLOADS" | Out-Null

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Configure
        shell: pwsh
        run: |
          cmake --preset windows-release `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
            -DCMAKE_MAKE_PROGRAM="$(Get-Command ninja | Select-Object -ExpandProperty Source)"

      - name: Build
        run: cmake --build --preset windows-release

      - name: Test
        run: ctest --test-dir build/windows-release --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dir = "VideoAnalyser-${version}-windows-mingw-x64"
          $buildDir = "build/windows-release"
          New-Item -ItemType Directory -Force $dir | Out-Null
          # 复制可执行文件和所有 DLL（windeployqt + vcpkg 已部署到构建目录）
          Copy-Item "$buildDir/VideoAnalyser.exe" "$dir/"
          Get-ChildItem "$buildDir/*.dll" -ErrorAction SilentlyContinue | Copy-Item -Destination "$dir/"
          # 复制 Qt 插件子目录
          foreach ($sub in @("platforms","styles","imageformats","iconengines","tls","generic","networkinformation")) {
            if (Test-Path "$buildDir/$sub") { Copy-Item -Recurse "$buildDir/$sub" "$dir/" }
          }
          # 复制 MinGW 运行时 DLL（如果 windeployqt 未自动处理）
          $mingwBin = (Get-Command gcc.exe -ErrorAction SilentlyContinue).Source | Split-Path
          if ($mingwBin) {
            foreach ($dll in @("libgcc_s_seh-1.dll","libstdc++-6.dll","libwinpthread-1.dll")) {
              $src = Join-Path $mingwBin $dll
              if (Test-Path $src) { Copy-Item $src "$dir/" -ErrorAction SilentlyContinue }
            }
          }
          Copy-Item "LICENSE" "$dir/" -ErrorAction SilentlyContinue

      - uses: actions/upload-artifact@v4
        with:
          name: VideoAnalyser-${{ github.ref_name }}-windows-mingw-x64
          path: VideoAnalyser-${{ github.ref_name }}-windows-mingw-x64/

  # ── 2. Windows MSVC 动态链接 ──────────────────────────
  win-msvc:
    name: Windows MSVC (Dynamic)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-
            vcpkg-downloads-${{ runner.os }}-

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install Qt (MSVC)
        uses: jurplel/install-qt-action@v4
        with:
          dir: '${{ env.QT_INSTALL_DIR }}'
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtcharts'
          cache: true

      - name: Ensure vcpkg downloads directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "$env:VCPKG_DOWNLOADS" | Out-Null

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Configure
        shell: pwsh
        run: |
          cmake --preset windows-msvc-release `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR"

      - name: Build
        run: cmake --build --preset windows-msvc-release

      - name: Test
        run: ctest --test-dir build/windows-msvc-release --output-on-failure

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dir = "VideoAnalyser-${version}-windows-msvc-x64"
          $buildDir = "build/windows-msvc-release"
          New-Item -ItemType Directory -Force $dir | Out-Null
          Copy-Item "$buildDir/VideoAnalyser.exe" "$dir/"
          Get-ChildItem "$buildDir/*.dll" -ErrorAction SilentlyContinue | Copy-Item -Destination "$dir/"
          foreach ($sub in @("platforms","styles","imageformats","iconengines","tls","generic","networkinformation")) {
            if (Test-Path "$buildDir/$sub") { Copy-Item -Recurse "$buildDir/$sub" "$dir/" }
          }
          Copy-Item "LICENSE" "$dir/" -ErrorAction SilentlyContinue

      - uses: actions/upload-artifact@v4
        with:
          name: VideoAnalyser-${{ github.ref_name }}-windows-msvc-x64
          path: VideoAnalyser-${{ github.ref_name }}-windows-msvc-x64/

  # ── 3. Windows MinGW 静态单文件 ──────────────────────
  win-mingw-static:
    name: Windows MinGW (Static)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-
            vcpkg-downloads-${{ runner.os }}-

      - name: Install MinGW
        uses: jurplel/install-qt-action@v4
        with:
          dir: '${{ env.QT_INSTALL_DIR }}'
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          tools: 'tools_mingw1310'
          install-deps: false
          cache: true

      - name: Set up MinGW
        shell: pwsh
        run: |
          $mingwBin = Get-ChildItem "$env:IQTA_TOOLS\mingw*\bin" -Directory | Select-Object -First 1
          echo "$mingwBin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Ensure vcpkg downloads directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "$env:VCPKG_DOWNLOADS" | Out-Null

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Configure
        shell: pwsh
        run: |
          cmake --preset windows-static `
            -DCMAKE_MAKE_PROGRAM="$(Get-Command ninja | Select-Object -ExpandProperty Source)"

      - name: Build
        run: cmake --build --preset windows-static

      - name: Test
        run: ctest --test-dir build/windows-static --output-on-failure

      - name: Verify single executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem "build/windows-static/VideoAnalyser.exe" -ErrorAction Stop
          Write-Host "Static executable: $($exe.FullName) ($([math]::Round($exe.Length / 1MB, 2)) MB)"
          $deps = & objdump -p $exe.FullName 2>$null | Select-String "DLL Name:" |
                  ForEach-Object { ($_ -split "DLL Name:\s*")[1].Trim() } |
                  Where-Object { $_ -notmatch '^(KERNEL32|USER32|GDI32|SHELL32|ADVAPI32|COMCTL32|COMDLG32|ole32|OLEAUT32|WS2_32|WSOCK32|IMM32|WINMM|dwmapi|UxTheme|VERSION|NETAPI32|USERENV|WTSAPI32|SHLWAPI|CRYPT32|bcrypt|ncrypt|secur32|iphlpapi|dnsapi|msvcrt|ntdll|api-ms-|ext-ms-)' }
          if ($deps) {
            Write-Host "Non-system DLL dependencies found:"
            $deps | ForEach-Object { Write-Host "  $_" }
          } else {
            Write-Host "No non-system DLL dependencies — truly portable"
          }

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dir = "VideoAnalyser-${version}-windows-mingw-x64-static"
          New-Item -ItemType Directory -Force $dir | Out-Null
          Copy-Item "build/windows-static/VideoAnalyser.exe" "$dir/"
          Copy-Item "LICENSE" "$dir/" -ErrorAction SilentlyContinue

      - uses: actions/upload-artifact@v4
        with:
          name: VideoAnalyser-${{ github.ref_name }}-windows-mingw-x64-static
          path: VideoAnalyser-${{ github.ref_name }}-windows-mingw-x64-static/

      - name: Install UPX
        run: choco install upx -y

      - name: Package (UPX)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dir = "VideoAnalyser-${version}-windows-mingw-x64-static-upx"
          New-Item -ItemType Directory -Force $dir | Out-Null
          Copy-Item "build/windows-static/VideoAnalyser.exe" "$dir/"
          & upx --best "$dir/VideoAnalyser.exe"
          $orig = (Get-Item "build/windows-static/VideoAnalyser.exe").Length
          $compressed = (Get-Item "$dir/VideoAnalyser.exe").Length
          Write-Host "UPX: $([math]::Round($orig / 1MB, 2)) MB -> $([math]::Round($compressed / 1MB, 2)) MB"
          Copy-Item "LICENSE" "$dir/" -ErrorAction SilentlyContinue

      - uses: actions/upload-artifact@v4
        with:
          name: VideoAnalyser-${{ github.ref_name }}-windows-mingw-x64-static-upx
          path: VideoAnalyser-${{ github.ref_name }}-windows-mingw-x64-static-upx/

  # ── 4. Windows MSVC 静态单文件 ───────────────────────
  win-msvc-static:
    name: Windows MSVC (Static)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-
            vcpkg-downloads-${{ runner.os }}-

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install pkg-config
        run: choco install pkgconfiglite -y

      - name: Ensure vcpkg downloads directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "$env:VCPKG_DOWNLOADS" | Out-Null

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Configure
        shell: pwsh
        run: cmake --preset windows-msvc-static

      - name: Build
        run: cmake --build --preset windows-msvc-static

      - name: Test
        run: ctest --test-dir build/windows-msvc-static --output-on-failure

      - name: Verify single executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem "build/windows-msvc-static/VideoAnalyser.exe" -ErrorAction Stop
          Write-Host "Static executable: $($exe.FullName) ($([math]::Round($exe.Length / 1MB, 2)) MB)"
          # MSVC 静态链接使用 /MT，不依赖 vcruntime DLL
          & dumpbin /dependents $exe.FullName 2>$null | Select-String "\.dll" |
            ForEach-Object { Write-Host "  $($_.Line.Trim())" }

      - name: Package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dir = "VideoAnalyser-${version}-windows-msvc-x64-static"
          New-Item -ItemType Directory -Force $dir | Out-Null
          Copy-Item "build/windows-msvc-static/VideoAnalyser.exe" "$dir/"
          Copy-Item "LICENSE" "$dir/" -ErrorAction SilentlyContinue

      - uses: actions/upload-artifact@v4
        with:
          name: VideoAnalyser-${{ github.ref_name }}-windows-msvc-x64-static
          path: VideoAnalyser-${{ github.ref_name }}-windows-msvc-x64-static/

      - name: Install UPX
        run: choco install upx -y

      - name: Package (UPX)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $dir = "VideoAnalyser-${version}-windows-msvc-x64-static-upx"
          New-Item -ItemType Directory -Force $dir | Out-Null
          Copy-Item "build/windows-msvc-static/VideoAnalyser.exe" "$dir/"
          & upx --best "$dir/VideoAnalyser.exe"
          $orig = (Get-Item "build/windows-msvc-static/VideoAnalyser.exe").Length
          $compressed = (Get-Item "$dir/VideoAnalyser.exe").Length
          Write-Host "UPX: $([math]::Round($orig / 1MB, 2)) MB -> $([math]::Round($compressed / 1MB, 2)) MB"
          Copy-Item "LICENSE" "$dir/" -ErrorAction SilentlyContinue

      - uses: actions/upload-artifact@v4
        with:
          name: VideoAnalyser-${{ github.ref_name }}-windows-msvc-x64-static-upx
          path: VideoAnalyser-${{ github.ref_name }}-windows-msvc-x64-static-upx/

  # ── 5. Linux GCC 动态链接 ─────────────────────────────
  linux-gcc:
    name: Linux GCC (Dynamic)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-
            vcpkg-downloads-${{ runner.os }}-

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          dir: '${{ env.QT_INSTALL_DIR }}'
          version: '6.8.*'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtcharts'
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config nasm patchelf \
            libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-0 \
            libxcb-xinerama0 libxcb-cursor0

      - name: Ensure vcpkg downloads directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "$env:VCPKG_DOWNLOADS" | Out-Null

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Configure
        run: |
          cmake --preset linux-release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        run: cmake --build --preset linux-release

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build/linux-release --output-on-failure

      - name: Package
        run: |
          version="${{ github.ref_name }}"
          dir="VideoAnalyser-${version}-linux-gcc-x64"
          mkdir -p "$dir/lib" "$dir/plugins/platforms"

          # 复制主程序
          cp build/linux-release/VideoAnalyser "$dir/"

          # 用 ldd 收集非系统共享库（Qt、FFmpeg 等）
          ldd "build/linux-release/VideoAnalyser" | \
            awk '/=>/ && !/linux-vdso|ld-linux/ {print $3}' | sort -u | \
            while read -r lib; do
              [ -z "$lib" ] && continue
              base="$(basename "$lib")"
              # 跳过基础系统库（glibc、libm、libdl、线程库等）
              case "$base" in
                libc.so*|libm.so*|libdl.so*|librt.so*|libpthread.so*) continue ;;
                libgcc_s.so*|libstdc++.so*|ld-linux*) continue ;;
              esac
              cp -L "$lib" "$dir/lib/" 2>/dev/null || true
            done

          # Qt 平台插件
          if [ -d "$QT_ROOT_DIR/plugins/platforms" ]; then
            cp "$QT_ROOT_DIR/plugins/platforms/libqxcb.so" "$dir/plugins/platforms/" 2>/dev/null || true
            cp "$QT_ROOT_DIR/plugins/platforms/libqwayland"*.so "$dir/plugins/platforms/" 2>/dev/null || true
          fi
          # 收集平台插件自身的非系统依赖
          for plugin in "$dir"/plugins/platforms/*.so; do
            [ -f "$plugin" ] || continue
            ldd "$plugin" 2>/dev/null | awk '/=>/ && !/linux-vdso|ld-linux/ {print $3}' | \
              while read -r lib; do
                [ -z "$lib" ] && continue
                base="$(basename "$lib")"
                case "$base" in
                  libc.so*|libm.so*|libdl.so*|librt.so*|libpthread.so*|libgcc_s.so*|libstdc++.so*|ld-linux*) continue ;;
                esac
                [ -f "$dir/lib/$base" ] || cp -L "$lib" "$dir/lib/" 2>/dev/null || true
              done
          done

          # 设置 RPATH，使程序能找到打包的共享库
          patchelf --set-rpath '$ORIGIN/lib' "$dir/VideoAnalyser" 2>/dev/null || true

          # 创建启动脚本
          cat > "$dir/VideoAnalyser.sh" << 'SCRIPT'
          #!/bin/bash
          HERE="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="${HERE}/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          export QT_PLUGIN_PATH="${HERE}/plugins"
          exec "${HERE}/VideoAnalyser" "$@"
          SCRIPT
          chmod +x "$dir/VideoAnalyser.sh"

          cp LICENSE "$dir/" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: VideoAnalyser-${{ github.ref_name }}-linux-gcc-x64
          path: VideoAnalyser-${{ github.ref_name }}-linux-gcc-x64/

  # ── 6. Linux GCC 静态单文件 ──────────────────────────
  linux-gcc-static:
    name: Linux GCC (Static)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-
            vcpkg-downloads-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # vcpkg qtbase port 要求: '^libxcb.*-dev' libx11-xcb-dev libglu1-mesa-dev
          # libxrender-dev libxi-dev libxkbcommon-dev libxkbcommon-x11-dev libegl1-mesa-dev
          sudo apt-get install -y ninja-build pkg-config nasm \
            autoconf autoconf-archive automake libtool libltdl-dev \
            libgl1-mesa-dev libglu1-mesa-dev libegl1-mesa-dev libgbm-dev \
            libvulkan-dev libssl-dev libcups2-dev \
            libglib2.0-dev libclang-dev \
            libfontconfig1-dev libfreetype6-dev \
            libx11-dev libx11-xcb-dev libxext-dev libxfixes-dev \
            libxi-dev libxrender-dev libxrandr-dev libxcursor-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            '^libxcb.*-dev' \
            libsm-dev libice-dev \
            libatspi2.0-dev libdbus-1-dev \
            libharfbuzz-dev libdrm-dev \
            libinput-dev libmtdev-dev \
            libsystemd-dev libudev-dev \
            libxshmfence-dev libxxf86vm-dev \
            libwayland-dev

      - name: Ensure vcpkg downloads directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "$env:VCPKG_DOWNLOADS" | Out-Null

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Configure
        run: cmake --preset linux-static

      - name: Dump vcpkg build logs on failure
        if: failure()
        run: |
          echo "=== vcpkg manifest install log ==="
          cat build/linux-static/vcpkg-manifest-install.log 2>/dev/null || true
          for log in vcpkg/buildtrees/qtbase/config-x64-linux-out.log \
                     vcpkg/buildtrees/qtbase/config-x64-linux-rel-CMakeConfigureLog.yaml.log \
                     vcpkg/buildtrees/qtbase/config-x64-linux-dbg-CMakeConfigureLog.yaml.log \
                     vcpkg/buildtrees/qtbase/config-x64-linux-static-out.log \
                     vcpkg/buildtrees/qtbase/config-x64-linux-static-rel-CMakeConfigureLog.yaml.log \
                     vcpkg/buildtrees/qtbase/config-x64-linux-static-dbg-CMakeConfigureLog.yaml.log; do
            if [ -f "$log" ]; then
              echo "=== $(basename "$log") (last 120 lines) ==="
              tail -120 "$log"
            fi
          done

      - name: Build
        run: cmake --build --preset linux-static

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build/linux-static --output-on-failure

      - name: Verify executable
        run: |
          exe="build/linux-static/VideoAnalyser"
          ls -lh "$exe"
          echo "--- Dynamic dependencies (should only be system libs) ---"
          ldd "$exe" || echo "(fully static — no dynamic deps)"
          file "$exe"

      - name: Package
        run: |
          version="${{ github.ref_name }}"
          dir="VideoAnalyser-${version}-linux-gcc-x64-static"
          mkdir -p "$dir"
          cp build/linux-static/VideoAnalyser "$dir/"
          cp LICENSE "$dir/" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: VideoAnalyser-${{ github.ref_name }}-linux-gcc-x64-static
          path: VideoAnalyser-${{ github.ref_name }}-linux-gcc-x64-static/

      - name: Install UPX
        run: |
          UPX_VERSION="4.2.4"
          curl -sL "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz" | tar xJ
          sudo cp "upx-${UPX_VERSION}-amd64_linux/upx" /usr/local/bin/
          upx --version

      - name: Package (UPX)
        run: |
          version="${{ github.ref_name }}"
          dir="VideoAnalyser-${version}-linux-gcc-x64-static-upx"
          mkdir -p "$dir"
          cp build/linux-static/VideoAnalyser "$dir/"
          orig_size=$(stat -c%s "build/linux-static/VideoAnalyser")
          upx --best "$dir/VideoAnalyser"
          compressed_size=$(stat -c%s "$dir/VideoAnalyser")
          echo "UPX: $(echo "scale=2; $orig_size / 1048576" | bc) MB -> $(echo "scale=2; $compressed_size / 1048576" | bc) MB"
          cp LICENSE "$dir/" 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: VideoAnalyser-${{ github.ref_name }}-linux-gcc-x64-static-upx
          path: VideoAnalyser-${{ github.ref_name }}-linux-gcc-x64-static-upx/

  # ── 7. macOS Clang 动态链接 ───────────────────────────
  macos-clang:
    name: macOS Clang (Dynamic)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-
            vcpkg-downloads-${{ runner.os }}-

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          dir: '${{ env.QT_INSTALL_DIR }}'
          version: '6.8.*'
          host: 'mac'
          target: 'desktop'
          modules: 'qtcharts'
          cache: true

      - name: Install system dependencies
        run: brew install nasm

      - name: Ensure vcpkg downloads directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "$env:VCPKG_DOWNLOADS" | Out-Null

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Configure
        run: |
          cmake --preset macos-release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        run: cmake --build --preset macos-release

      - name: Test
        run: ctest --test-dir build/macos-release --output-on-failure

      - name: Package
        run: |
          version="${{ github.ref_name }}"
          app_name="VideoAnalyser"
          dmg_name="${app_name}-${version}-macos-arm64"
          build_dir="build/macos-release"

          # macdeployqt 已在构建后自动执行，.app 内已包含 Qt 框架
          # 复制 vcpkg 的 FFmpeg dylib 到 .app/Contents/Frameworks
          frameworks_dir="${build_dir}/${app_name}.app/Contents/Frameworks"
          mkdir -p "$frameworks_dir"
          if [ -d "${VCPKG_ROOT}/installed/arm64-osx/lib" ]; then
            find "${VCPKG_ROOT}/installed/arm64-osx/lib" -name "*.dylib" -exec cp {} "$frameworks_dir/" \; 2>/dev/null || true
          fi

          # 使用 install_name_tool 修复 dylib 的加载路径
          for lib in "$frameworks_dir"/*.dylib; do
            [ -f "$lib" ] || continue
            install_name_tool -id "@executable_path/../Frameworks/$(basename "$lib")" "$lib" 2>/dev/null || true
          done

          # 创建 DMG
          mkdir -p dmg_staging
          cp -R "${build_dir}/${app_name}.app" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          cp LICENSE dmg_staging/ 2>/dev/null || true
          hdiutil create -volname "$app_name" -srcfolder dmg_staging \
            -ov -format UDZO "${dmg_name}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-clang-dynamic
          path: VideoAnalyser-*-macos-arm64.dmg

  # ── 8. macOS Clang 静态单文件 ─────────────────────────
  macos-clang-static:
    name: macOS Clang (Static)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache environment variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-downloads-${{ runner.os }}-${{ env.VCPKG_COMMIT }}-
            vcpkg-downloads-${{ runner.os }}-

      - name: Install system dependencies
        run: brew install nasm autoconf autoconf-archive automake libtool pkg-config ninja

      - name: Ensure vcpkg downloads directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "$env:VCPKG_DOWNLOADS" | Out-Null

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Configure
        run: cmake --preset macos-static

      - name: Build
        run: cmake --build --preset macos-static

      - name: Test
        run: ctest --test-dir build/macos-static --output-on-failure

      - name: Verify executable
        run: |
          app="build/macos-static/VideoAnalyser.app/Contents/MacOS/VideoAnalyser"
          ls -lh "$app"
          echo "--- Dynamic dependencies (should only be system frameworks) ---"
          otool -L "$app"
          file "$app"

      - name: Package
        run: |
          version="${{ github.ref_name }}"
          dir="VideoAnalyser-${version}-macos-arm64-static"
          mkdir -p "$dir"
          cp -R build/macos-static/VideoAnalyser.app "$dir/"
          cp LICENSE "$dir/" 2>/dev/null || true
          # 创建 DMG
          mkdir -p dmg_staging
          cp -R "$dir/VideoAnalyser.app" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "VideoAnalyser" -srcfolder dmg_staging \
            -ov -format UDZO "${dir}.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-clang-static
          path: VideoAnalyser-*-macos-arm64-static.dmg

  # ── 创建 GitHub Release ──────────────────────────────
  release:
    name: Create Release
    needs:
      - win-mingw
      - win-msvc
      - win-mingw-static
      - win-msvc-static
      - linux-gcc
      - linux-gcc-static
      - macos-clang
      - macos-clang-static
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cd artifacts
          for d in */; do
            name="${d%/}"
            # macOS: DMG 文件直接复制
            if ls "${d}"*.dmg 1>/dev/null 2>&1; then
              cp "${d}"*.dmg ../release/
            # Linux: 创建 tar.gz（包含顶层目录）
            elif [[ "$name" == *linux* ]]; then
              tar czf "../release/${name}.tar.gz" "$name"
            # Windows: 创建 zip（文件在根层级）
            else
              (cd "$name" && zip -r "../../release/${name}.zip" .)
            fi
          done
          cd ..
          echo "=== Release assets ==="
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
