# ============================================
# vcpkg 缓存预热工作流
# 在 main 分支上预编译所有 release triplet 的 vcpkg 包，
# 使 release tag push 时能直接命中 x-gha 二进制缓存。
#
# 触发条件：
#   - vcpkg 相关文件变更时自动运行
#   - 每周一定时运行（防止 7 天缓存过期）
#   - 支持手动触发
# ============================================
name: vcpkg Cache Warmup

on:
  push:
    branches: [main, master]
    paths:
      - 'vcpkg.json'
      - 'triplets/**'
      - 'CMakePresets.json'
      - '.github/workflows/vcpkg-cache.yml'
  schedule:
    - cron: '0 6 * * 1'   # 每周一 UTC 06:00
  workflow_dispatch:

permissions:
  contents: read
  actions: write          # x-gha 需要写入 Actions Cache

env:
  VCPKG_DOWNLOADS: "${{ github.workspace }}/.vcpkg/downloads"
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  VCPKG_COMMIT: 'b2f068faf45a3f04145bec0f52a66526ad590227'

jobs:
  # ── Windows 变体 ──────────────────────────────────────
  win-msvc-dynamic:
    name: "Warmup: x64-windows"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkg-dl-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-dl-${{ runner.os }}-

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Ensure vcpkg download directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "$env:VCPKG_DOWNLOADS" | Out-Null

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install packages (configure only)
        shell: pwsh
        run: |
          # 仅运行 vcpkg install 填充二进制缓存，无需完整 CMake configure
          & "$env:VCPKG_ROOT/vcpkg" install --triplet x64-windows --x-manifest-root=. --x-install-root=build/warmup-vcpkg

  win-mingw-static:
    name: "Warmup: x64-mingw-static"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkg-dl-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-dl-${{ runner.os }}-

      - name: Install MinGW
        uses: jurplel/install-qt-action@v4
        with:
          dir: '${{ github.workspace }}/.qt'
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          tools: 'tools_mingw1310'
          install-deps: false
          cache: true

      - name: Set up MinGW
        shell: pwsh
        run: |
          $mingwBin = Get-ChildItem "$env:IQTA_TOOLS\mingw*\bin" -Directory | Select-Object -First 1
          echo "$mingwBin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Ensure vcpkg download directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "$env:VCPKG_DOWNLOADS" | Out-Null

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install packages
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT/vcpkg" install --triplet x64-mingw-static `
            --overlay-triplets=triplets `
            --x-manifest-root=. --x-install-root=build/warmup-vcpkg `
            --x-feature=static-qt

  win-msvc-static:
    name: "Warmup: x64-windows-static"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkg-dl-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-dl-${{ runner.os }}-

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Install pkg-config
        run: choco install pkgconfiglite -y

      - name: Ensure vcpkg download directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "$env:VCPKG_DOWNLOADS" | Out-Null

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install packages
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT/vcpkg" install --triplet x64-windows-static `
            --x-manifest-root=. --x-install-root=build/warmup-vcpkg `
            --x-feature=static-qt

  # ── Linux 变体 ───────────────────────────────────────
  linux-static:
    name: "Warmup: x64-linux-static"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkg-dl-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-dl-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config nasm \
            autoconf autoconf-archive automake libtool libltdl-dev \
            libgl1-mesa-dev libegl1-mesa-dev libgbm-dev \
            libvulkan-dev libssl-dev libcups2-dev \
            libglib2.0-dev libclang-dev \
            libfontconfig1-dev libfreetype6-dev \
            libx11-dev libx11-xcb-dev libxext-dev libxfixes-dev \
            libxi-dev libxrender-dev libxrandr-dev libxcursor-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb1-dev libxcb-glx0-dev \
            libxcb-keysyms1-dev libxcb-image0-dev \
            libxcb-render-util0-dev libxcb-icccm4-dev \
            libxcb-shape0-dev libxcb-xfixes0-dev \
            libxcb-randr0-dev libxcb-sync-dev \
            libxcb-shm0-dev libxcb-cursor-dev \
            libxcb-xinerama0-dev libxcb-util-dev \
            libxcb-xkb-dev libxcb-xinput-dev \
            libatspi2.0-dev libdbus-1-dev \
            libharfbuzz-dev libdrm-dev \
            libinput-dev libmtdev-dev \
            libsystemd-dev libudev-dev \
            libxshmfence-dev libxxf86vm-dev

      - name: Ensure vcpkg download directory
        run: mkdir -p "$VCPKG_DOWNLOADS"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install packages
        run: |
          "$VCPKG_ROOT/vcpkg" install --triplet x64-linux-static \
            --overlay-triplets=triplets \
            --x-manifest-root=. --x-install-root=build/warmup-vcpkg \
            --x-feature=static-qt

  # ── macOS 变体 ───────────────────────────────────────
  macos-static:
    name: "Warmup: arm64-osx-static"
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Cache vcpkg downloads
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DOWNLOADS }}
          key: vcpkg-dl-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-dl-${{ runner.os }}-

      - name: Install system dependencies
        run: brew install nasm autoconf autoconf-archive automake libtool pkg-config ninja

      - name: Ensure vcpkg download directory
        run: mkdir -p "$VCPKG_DOWNLOADS"

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Install packages
        run: |
          "$VCPKG_ROOT/vcpkg" install --triplet arm64-osx-static \
            --overlay-triplets=triplets \
            --x-manifest-root=. --x-install-root=build/warmup-vcpkg \
            --x-feature=static-qt
