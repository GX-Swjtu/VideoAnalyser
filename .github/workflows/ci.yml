name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build-windows:
    name: Windows (MinGW)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: 'qtcharts'
          tools: 'tools_mingw1310'

      - name: Set up MinGW
        shell: pwsh
        run: |
          # install-qt-action puts MinGW tools under $env:IQTA_TOOLS
          $mingwBin = Get-ChildItem "$env:IQTA_TOOLS\mingw*\bin" -Directory | Select-Object -First 1
          echo "$mingwBin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'b2f068faf45a3f04145bec0f52a66526ad590227'

      - name: Configure
        shell: pwsh
        run: |
          cmake --preset windows-debug `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
            -DCMAKE_MAKE_PROGRAM="$(Get-Command ninja | Select-Object -ExpandProperty Source)"

      - name: Build
        run: cmake --build --preset windows-debug

      - name: Test
        run: ctest --preset windows-debug --output-on-failure

  build-linux:
    name: Linux (GCC)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtcharts'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config \
            libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-0 \
            libxcb-xinerama0 libxcb-cursor0

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'b2f068faf45a3f04145bec0f52a66526ad590227'

      - name: Configure
        run: |
          cmake --preset linux-debug \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        run: cmake --build --preset linux-debug

      - name: Test
        run: ctest --preset linux-debug --output-on-failure

  # ============================================
  # 全静态构建：生成单文件绿色版可执行程序
  # Qt 和 FFmpeg 均通过 vcpkg 静态编译，无需外部 Qt 安装
  # ============================================
  build-windows-static:
    name: Windows Static (Green)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install MinGW
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          tools: 'tools_mingw1310'
          install-deps: false

      - name: Set up MinGW
        shell: pwsh
        run: |
          $mingwBin = Get-ChildItem "$env:IQTA_TOOLS\mingw*\bin" -Directory | Select-Object -First 1
          echo "$mingwBin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'b2f068faf45a3f04145bec0f52a66526ad590227'

      - name: Configure (static)
        shell: pwsh
        run: |
          cmake --preset windows-static `
            -DCMAKE_MAKE_PROGRAM="$(Get-Command ninja | Select-Object -ExpandProperty Source)"

      - name: Build (static)
        run: cmake --build --preset windows-static

      - name: Verify single executable
        shell: pwsh
        run: |
          $exe = Get-ChildItem "build/windows-static/VideoAnalyser.exe" -ErrorAction Stop
          Write-Host "✅ Static executable: $($exe.FullName) ($([math]::Round($exe.Length / 1MB, 2)) MB)"
          # 确认不依赖项目构建的 DLL（系统 DLL 如 kernel32 等是正常的）
          $deps = & objdump -p $exe.FullName 2>$null | Select-String "DLL Name:" |
                  ForEach-Object { ($_ -split "DLL Name:\s*")[1].Trim() } |
                  Where-Object { $_ -notmatch '^(KERNEL32|USER32|GDI32|SHELL32|ADVAPI32|COMCTL32|COMDLG32|ole32|OLEAUT32|WS2_32|WSOCK32|IMM32|WINMM|dwmapi|UxTheme|VERSION|NETAPI32|USERENV|WTSAPI32|SHLWAPI|CRYPT32|bcrypt|ncrypt|secur32|iphlpapi|dnsapi|msvcrt|ntdll|api-ms-|ext-ms-)' }
          if ($deps) {
            Write-Host "⚠️  Non-system DLL dependencies found:"
            $deps | ForEach-Object { Write-Host "   $_" }
          } else {
            Write-Host "✅ No non-system DLL dependencies"
          }

      - name: Upload static executable
        uses: actions/upload-artifact@v4
        with:
          name: VideoAnalyser-static-win64
          path: build/windows-static/VideoAnalyser.exe
          if-no-files-found: error
