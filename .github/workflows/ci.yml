# ============================================
# CI 工作流：push / PR 到 main 时快速验证
# 仅 Debug 构建 + 测试（Win MinGW + Linux GCC + macOS Clang）— 3 job
# Release / 静态构建由 Release workflow（push v* tag）负责
# ============================================
name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  QT_INSTALL_DIR: "${{ github.workspace }}/.qt"
  VCPKG_DOWNLOADS: "${{ github.workspace }}/.vcpkg/downloads"
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg/bincache,readwrite"
  VCPKG_COMMIT: 'b2f068faf45a3f04145bec0f52a66526ad590227'

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # 核心门禁：Debug 构建 + 测试（每次 push 和 PR 必跑）
  # 目的：断言检查、编译警告、快速反馈
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  debug-windows:
    name: Debug — Windows MinGW
    runs-on: windows-latest
    env:
      VCPKG_CACHE_TRIPLET: x64-mingw-dynamic
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_DOWNLOADS }}
            ${{ github.workspace }}/.vcpkg/bincache
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'triplets/*.cmake') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-${{ env.VCPKG_COMMIT }}-
            vcpkg-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-

      - name: Cache Qt artifacts
        uses: actions/cache@v4
        with:
          path: ${{ env.QT_INSTALL_DIR }}
          key: qt-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-6.8-win64_mingw-qtcharts-tools_mingw1310
          restore-keys: |
            qt-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-6.8-
            qt-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-

      - name: Install Qt (MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          dir: '${{ env.QT_INSTALL_DIR }}'
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          modules: 'qtcharts'
          tools: 'tools_mingw1310'

      - name: Set up MinGW
        shell: pwsh
        run: |
          $mingwBin = Get-ChildItem "$env:IQTA_TOOLS\mingw*\bin" -Directory | Select-Object -First 1
          echo "$mingwBin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Ensure vcpkg cache directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_DOWNLOADS" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE/.vcpkg/bincache" | Out-Null

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Configure
        shell: pwsh
        run: |
          cmake --preset windows-debug `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
            -DCMAKE_MAKE_PROGRAM="$(Get-Command ninja | Select-Object -ExpandProperty Source)"

      - name: Build
        run: cmake --build --preset windows-debug

      - name: Test
        run: ctest --preset windows-debug --output-on-failure

  debug-linux:
    name: Debug — Linux GCC
    runs-on: ubuntu-24.04
    env:
      VCPKG_CACHE_TRIPLET: x64-linux
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_DOWNLOADS }}
            ${{ github.workspace }}/.vcpkg/bincache
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'triplets/*.cmake') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-${{ env.VCPKG_COMMIT }}-
            vcpkg-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-

      - name: Cache Qt artifacts
        uses: actions/cache@v4
        with:
          path: ${{ env.QT_INSTALL_DIR }}
          key: qt-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-6.8-linux_gcc_64-qtcharts
          restore-keys: |
            qt-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-6.8-
            qt-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          dir: '${{ env.QT_INSTALL_DIR }}'
          version: '6.8.*'
          host: 'linux'
          target: 'desktop'
          arch: 'linux_gcc_64'
          modules: 'qtcharts'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build pkg-config nasm \
            libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-0 \
            libxcb-xinerama0 libxcb-cursor0

      - name: Ensure vcpkg cache directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_DOWNLOADS" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE/.vcpkg/bincache" | Out-Null

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Configure
        run: |
          cmake --preset linux-debug \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        run: cmake --build --preset linux-debug

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --preset linux-debug --output-on-failure

  debug-macos:
    name: Debug — macOS Clang
    runs-on: macos-14
    env:
      VCPKG_CACHE_TRIPLET: arm64-osx
    steps:
      - uses: actions/checkout@v4

      - name: Cache vcpkg artifacts
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.VCPKG_DOWNLOADS }}
            ${{ github.workspace }}/.vcpkg/bincache
          key: vcpkg-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json', 'triplets/*.cmake') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-${{ env.VCPKG_COMMIT }}-
            vcpkg-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-

      - name: Cache Qt artifacts
        uses: actions/cache@v4
        with:
          path: ${{ env.QT_INSTALL_DIR }}
          key: qt-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-6.8-qtcharts
          restore-keys: |
            qt-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-6.8-
            qt-${{ runner.os }}-${{ env.VCPKG_CACHE_TRIPLET }}-

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          dir: '${{ env.QT_INSTALL_DIR }}'
          version: '6.8.*'
          host: 'mac'
          target: 'desktop'
          modules: 'qtcharts'

      - name: Install system dependencies
        run: brew install nasm

      - name: Ensure vcpkg cache directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:VCPKG_DOWNLOADS" | Out-Null
          New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE/.vcpkg/bincache" | Out-Null

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'

      - name: Configure
        run: |
          cmake --preset macos-debug \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        run: cmake --build --preset macos-debug

      - name: Test
        run: ctest --preset macos-debug --output-on-failure
