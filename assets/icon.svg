    <text x="256" y="56"  opacity="0.14">00 00 00 1C 66 74 79 70 69 73 6F 6D 00 00 02 00 69 73</text>
    <text x="256" y="76"  opacity="0.12">6F 32 61 76 63 31 6D 70 34 31 00 00 00 08 66 72 65 65</text>
    <text x="256" y="96"  opacity="0.11">00 3C 54 15 6D 64 61 74 00 00 04 91 65 88 84 00 4E 7F</text>
    <text x="256" y="116" opacity="0.10">6D 6F 6F 76 00 00 00 6C 6D 76 68 64 00 00 D6 A4 4B 2C</text>
    <text x="256" y="136" opacity="0.09">00 00 03 E8 00 01 00 00 01 00 00 00 00 00 00 00 00 01</text>
    <text x="256" y="156" opacity="0.08">74 72 61 6B 00 00 00 5C 74 6B 68 64 00 03 D6 A4 4B 2C</text>
    <text x="256" y="176" opacity="0.07">00 00 00 01 00 00 D2 F0 00 00 00 00 00 01 00 00 00 00</text>
    <text x="256" y="196" opacity="0.07">40 00 00 00 01 40 00 00 00 F0 00 00 00 18 FF FF 00 00</text>
    <text x="256" y="216" opacity="0.06">65 64 74 73 00 00 00 1C 65 6C 73 74 00 00 00 01 D2 F0</text>
    <text x="256" y="236" opacity="0.06">6D 64 69 61 00 00 00 20 6D 64 68 64 00 00 D6 A4 4B 2C</text>
    <text x="256" y="256" opacity="0.05">68 64 6C 72 00 00 00 00 76 69 64 65 6F 48 61 6E 64 6C</text>
    <text x="256" y="276" opacity="0.05">73 74 62 6C 00 00 00 A1 73 74 73 64 00 00 00 01 91 61</text>
  </g>

  <!-- 蓝色 Hex 下半区 (渐亮) -->
  <g font-family="'Cascadia Code','Consolas','SF Mono','Courier New',monospace" font-size="15" fill="#0984E3" font-weight="500" text-anchor="middle">
    <text x="256" y="296" opacity="0.08">61 76 63 43 01 64 00 1F FF E1 00 18 67 64 00 1F AC D9</text>
    <text x="256" y="316" opacity="0.12">00 00 03 00 10 C0 F1 62 E4 80 01 00 04 68 EB E3 CB FD</text>
    <text x="256" y="336" opacity="0.16">NAL: 67 64 00 1F AC D9 40 50 05 BB 01 10 00 03 SPS IDR</text>
    <text x="256" y="356" opacity="0.20">IDR 65 88 84 00 4E 7F 87 FC C8 47 A5 1E 38 40 80 61 1C</text>
    <text x="256" y="376" opacity="0.24">SPS: 67 64 00 1F  PPS: 68 EB E3 CB  SEI: 06 05 FF FF 49</text>
    <text x="256" y="396" opacity="0.28">AUD 09 10 SLICE 41 9A 24 6C 41 FF FE DC BA 98 76 54 32</text>
    <text x="256" y="416" opacity="0.30">GOP:30 KEY=1 REF=3 QP=24 BIT:4.2M FPS:29.97 SIZE:1920x1080</text>
    <text x="256" y="436" opacity="0.28">STREAM#0 H.264/AVC  STREAM#1 AAC-LC 44100Hz STEREO  MP4</text>
    <text x="256" y="456" opacity="0.22">00 04 91 65 88 84 4E 7F 87 FC C8 47 A5 1E FE 30 A4 00</text>
    <text x="256" y="476" opacity="0.16">SIZE:1920x1080 PIX:YUV420P PROFILE:High LEVEL:3.1 BIT:4.2M</text>
    <text x="256" y="493" opacity="0.10">C4 CA D0 D6 DC E2 E8 EF F5 FB 00 00 4C 61 76 63 35 38</text>
  </g>

  <!-- ===== 放大镜 ===== -->

  <!-- 外圈辉光 -->
  <circle cx="215" cy="200" r="122" fill="none"
          stroke="#0984E3" stroke-width="1.5" opacity="0.2" filter="url(#blueGlow)"/>

  <!-- 镜片填充 -->
  <circle cx="215" cy="200" r="108" fill="url(#lensGrad)"/>

  <!-- 镜片内网格线 -->
  <g clip-path="url(#lensClip)" stroke="#0984E3" stroke-width="0.4" opacity="0.1">
    <line x1="107" y1="160" x2="323" y2="160"/>
    <line x1="107" y1="180" x2="323" y2="180"/>
    <line x1="107" y1="200" x2="323" y2="200"/>
    <line x1="107" y1="220" x2="323" y2="220"/>
    <line x1="107" y1="240" x2="323" y2="240"/>
