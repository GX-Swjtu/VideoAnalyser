<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景渐变: 深蓝到深灰 -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="50%" stop-color="#1B2838"/>
      <stop offset="100%" stop-color="#2D3436"/>
    </linearGradient>

    <!-- 镜片内部渐变 -->
    <radialGradient id="lensGrad" cx="0.35" cy="0.35" r="0.7">
      <stop offset="0%" stop-color="#0f2744"/>
      <stop offset="100%" stop-color="#091a30"/>
    </radialGradient>

    <!-- 镜框渐变 -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#74B9FF"/>
      <stop offset="50%" stop-color="#0984E3"/>
      <stop offset="100%" stop-color="#0652DD"/>
    </linearGradient>

    <!-- 手柄渐变 -->
    <linearGradient id="handleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0984E3"/>
      <stop offset="100%" stop-color="#0652DD"/>
    </linearGradient>

    <!-- 波形辉光滤镜 -->
    <filter id="waveGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#00B894" flood-opacity="0.7" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 蓝色辉光 -->
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#0984E3" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="colorBlur"/>
      <feMerge>
        <feMergeNode in="colorBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 文字辉光 -->
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 镜片裁剪区域 -->
    <clipPath id="lensClip">
      <circle cx="215" cy="200" r="108"/>
    </clipPath>

    <!-- 边框辉光 -->
    <filter id="borderGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 全局圆角裁剪 (与背景矩形完全一致) -->
    <clipPath id="bgClip">
      <rect x="16" y="16" width="480" height="480" rx="80" ry="80"/>
    </clipPath>
  </defs>

  <!-- ===== 主背景 ===== -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bgGrad)"/>

  <!-- 边框辉光 -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80"
        fill="none" stroke="#0984E3" stroke-width="2" opacity="0.5" filter="url(#borderGlow)"/>

  <!-- ===== 全屏密铺 Hex 背景文字 (数据瀑布, 圆角裁剪) ===== -->
  <g clip-path="url(#bgClip)">
  <g font-family="'Cascadia Code','Consolas','SF Mono','Courier New',monospace" font-size="15" fill="#0984E3" font-weight="500" text-anchor="middle">
