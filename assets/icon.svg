    <line x1="181" y1="92" x2="181" y2="308"/>
    <line x1="215" y1="92" x2="215" y2="308"/>
    <line x1="249" y1="92" x2="249" y2="308"/>
    <line x1="283" y1="92" x2="283" y2="308"/>
  </g>

  <!-- ===== 波形 (镜片内裁剪) ===== -->
  <g clip-path="url(#lensClip)">
    <!-- 主波形: 视频码率/分析曲线 (青色, 明亮, 粗线条) -->
    <polyline
      points="110,210 120,205 128,195 136,215 142,178 150,198
              158,168 166,205 172,158 180,188 188,148 196,192
              204,175 212,205 218,165 226,195 234,180 242,210
              248,172 256,198 264,185 272,212 278,192 286,205
              294,195 302,210 310,200 318,208 325,202"
      fill="none" stroke="#00B894" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"
      filter="url(#waveGlow)"/>

    <!-- 副波形: 音频波形 (浅蓝, 细线条) -->
    <polyline
      points="110,225 118,222 126,230 134,218 142,232 150,224
              158,236 166,220 174,234 182,216 190,230 198,214
              206,228 214,218 222,232 230,220 238,228 246,216
              254,232 262,224 270,234 278,220 286,228 294,222
              302,230 310,226 318,228 325,225"
      fill="none" stroke="#74B9FF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
      opacity="0.5"/>

    <!-- 第三层极细波形: 低频分量 -->
    <polyline
      points="110,198 135,195 160,192 185,196 210,190 235,194 260,191 285,196 310,193 325,195"
      fill="none" stroke="#00B894" stroke-width="0.8" stroke-linecap="round"
      opacity="0.25"/>
  </g>

  <!-- 镜框环 -->
  <circle cx="215" cy="200" r="108" fill="none" stroke="url(#ringGrad)" stroke-width="8"/>

  <!-- 镜框高光 (内) -->
  <circle cx="215" cy="200" r="104" fill="none" stroke="#FFFFFF" stroke-width="0.8" opacity="0.06"/>

  <!-- 镜片左上角高光反射 -->
  <ellipse cx="175" cy="155" rx="30" ry="15" fill="#FFFFFF" opacity="0.04"
           transform="rotate(-30, 175, 155)"/>

  <!-- ===== 手柄 ===== -->
  <!-- 主手柄 -->
  <line x1="296" y1="282" x2="392" y2="378"
        stroke="url(#handleGrad)" stroke-width="28" stroke-linecap="round"/>

  <!-- 手柄高光 -->
  <line x1="300" y1="278" x2="388" y2="366"
        stroke="#74B9FF" stroke-width="3.5" stroke-linecap="round" opacity="0.25"/>

  <!-- 手柄纹理 -->
  <line x1="344" y1="325" x2="350" y2="331" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.15"/>
  <line x1="356" y1="337" x2="362" y2="343" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.12"/>
  <line x1="368" y1="349" x2="374" y2="355" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" opacity="0.09"/>

  <!-- (底部 Hex 已合并到全屏密铺背景层) -->

  <!-- 底部青色高亮覆盖层 (整体居中, 左侧对齐) -->
  <g font-family="'Cascadia Code','Consolas','SF Mono','Courier New',monospace" font-size="15" fill="#00B894" font-weight="600" filter="url(#textGlow)" text-anchor="start" transform="translate(68,0)">
    <text x="0" y="336" opacity="0.28">NAL: 67 64 00 1F AC D9 40 50  SPS</text>
    <text x="0" y="356" opacity="0.25">IDR  65 88 84 00 4E 7F 87 FC  C8</text>
    <text x="0" y="376" opacity="0.25">SPS: 67 64 00 1F  PPS: 68 EB E3</text>
    <text x="0" y="396" opacity="0.30">AUD  09 10  SLICE 41 9A 24 6C 41</text>
    <text x="0" y="416" opacity="0.40">GOP:30  KEY=1  BIT:4.2M  FPS:29.97</text>
    <text x="0" y="436" opacity="0.30">STREAM#0 H.264  #1 AAC 44100Hz</text>
    <text x="0" y="456" opacity="0.22">00 04 91 65 88 84 4E 7F 87 FC C8</text>
    <text x="0" y="476" opacity="0.18">SIZE:1920x1080  PROFILE:High  L3.1</text>
    <text x="0" y="493" opacity="0.12">DURATION:00:05:23  CONTAINER:MP4</text>
  </g>
  </g> <!-- /bgClip -->

  <!-- ===== 装饰粒子 ===== -->
  <circle cx="422" cy="110" r="2.5" fill="#00B894" opacity="0.45"/>
  <circle cx="445" cy="135" r="1.8" fill="#0984E3" opacity="0.35"/>
  <circle cx="460" cy="100" r="1.2" fill="#74B9FF" opacity="0.4"/>
  <circle cx="85" cy="310" r="2" fill="#00B894" opacity="0.3"/>
  <circle cx="68" cy="330" r="1.2" fill="#0984E3" opacity="0.25"/>
  <circle cx="440" cy="300" r="1.5" fill="#00B894" opacity="0.2"/>
  <circle cx="455" cy="280" r="1" fill="#74B9FF" opacity="0.3"/>

  <!-- 角落装饰线 -->
  <line x1="430" y1="56" x2="460" y2="56" stroke="#0984E3" stroke-width="1" opacity="0.15"/>
  <line x1="460" y1="56" x2="460" y2="86" stroke="#0984E3" stroke-width="1" opacity="0.15"/>
</svg>
